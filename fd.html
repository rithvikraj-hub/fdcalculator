<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.calculator-container{
    width:400px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    border:2px solid #2563eb;
}

.calculator-container h1{
    text-align:center;
    margin-bottom:25px;
    color:#2563eb;
}

.input-box{
    margin-bottom:20px;
}

.input-box h5{
    margin-bottom:10px;
    color:#334155;
}

input[type="range"]{
    width:100%;
    height:8px;
    border-radius:5px;
    background:#cbd5e1;
    outline:none;
    cursor:pointer;
}

input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    width:20px;
    height:20px;
    border-radius:50%;
    background:#2563eb;
    border:2px solid white;
    box-shadow:0 0 5px rgba(0,0,0,0.3);
    cursor:pointer;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

.result-box{
    margin-top:25px;
    padding:15px;
    text-align:center;
    background:#f1f5f9;
    border-radius:8px;
}

.result-box h3{
    color:#0f172a;
}
</style>
</head>

<body>

<div class="calculator-container">

    <h1>Investment Calculator</h1>

    <div class="input-box">
        <h5>Invested Value: ₹<span id="amountValue">10000</span></h5>
        <input type="range"
               id="amount"
               min="1000"
               max="1000000"
               value="10000"
               step="1000"
               oninput="amountValue.innerText=this.value">
    </div>

    <div class="input-box">
        <h5>Rate of Interest: <span id="rateValue">8</span>%</h5>
        <input type="range"
               id="rate"
               min="1"
               max="18"
               value="8"
               step="0.5"
               oninput="rateValue.innerText=this.value">
    </div>

    <div class="input-box">
        <h5>Tenure: <span id="yearsValue">5</span> Years</h5>
        <input type="range"
               id="years"
               min="1"
               max="65"
               value="5"
               oninput="yearsValue.innerText=this.value">
    </div>

    <button onclick="calculateInvestment()">Invest Now</button>

    <div class="result-box">
        <h3 id="result">Total Value: ₹0</h3>
    </div>

</div>

<script>
function calculateInvestment() {
    let amount = Number(document.getElementById("amount").value);
    let rate = Number(document.getElementById("rate").value);
    let years = Number(document.getElementById("years").value);

    let total = amount + (amount * rate * years / 100);

    document.getElementById("result").innerHTML =
        "Total Value: ₹" + total.toFixed(2);
}
</script>

</body>
</html>
