<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>fd calculator</title>
</head>
<body>
    <div class="calculator">
        <h1>FD calculator</h1>
    <div class="input-section">
        <label for="Investment">Total</label>
<input  type="range"id="Investment" min="1000" max="1000000"step="1000"value="1000000">
<span id="Investment-value">1000000</span>
    </div>
    <div class="input-section">
        <label for="Interest">interest rate</label>
<input  type="range"id="interest" min="1" max="18"step="0.1"value="6.5">
<span id="interest-value">6.5</span>
    </div>
    <div class="input-section">
        <label for="Time">time period</label>
<input  type="range"id="Time" min="1" max="65"step="1"value="6">
<span id="Time-vale">6</span>
</div>
<button onclick="calculator()">Invest now</button>
<div class="out-section">
    <p>Investment Value: <span id="Investment-amount">----</span></p>
    <p>Estimated Return: <span id="estimated-return">----</span></p>
    <p>Total Amount: <span id="total-value">----</span></p>
</div>
</div>
</body>
